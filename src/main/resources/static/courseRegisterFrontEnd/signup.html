<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Sign In</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    padding:20px;
}

.container{
    width:400px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:600;
    color:#374151;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,0.3);
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:gray;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🔐</div>

    <h1>User Sign Up</h1>

    <p class="subtitle">
        Balamurugan Course Registration System
    </p>

    <label>User Name</label>
    <input
        type="text"
        id="username"
        name="name"
        placeholder="Enter username">

    <label>Password</label>
    <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password">


    <button onclick="signup()">
        Sign Up
    </button>

    <p id="status"></p>

    <div class="footer">
        Secure Login Portal
    </div>

</div>

<script>

function signup(){

    const data = {
        name: document.getElementById("username").value,
        password: document.getElementById("password").value
    };

    console.log(data);

    // Add your fetch call here

    
    fetch("http://localhost:8080/public/userRegister",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    })
    .then(response=>response.text())
    .then(result=>{
        document.getElementById("status").innerText=result;
    });

}

</script>

</body>
</html>
