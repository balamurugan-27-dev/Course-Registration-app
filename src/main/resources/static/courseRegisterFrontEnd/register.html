<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Registration</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    padding:20px;
}

.container{
    width:450px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    font-size:55px;
}

h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:600;
    color:#374151;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,0.3);
}

button{
    width:100%;
    padding:14px;
    margin-top:25px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

#result{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:green;
}

.course-info{
    margin-top:20px;
    background:#eff6ff;
    padding:15px;
    border-radius:10px;
    color:#1e3a8a;
    font-size:14px;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:gray;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🎓</div>

    <h2>Course Registration</h2>

    <p class="subtitle">
        Register for your preferred course
    </p>

    <label>Full Name</label>
    <input type="text" id="inname" placeholder="Enter your name">

    <label>Email Address</label>
    <input type="email" id="inemail" placeholder="Enter your email">

    <label>Select Course</label>
    <select id="incourse">
        <option value="JAVA">☕ Java Programming</option>
        <option value="PYTHON">🐍 Python Programming</option>
        <option value="HTML,CSS,JS">🌐 HTML, CSS & JavaScript</option>
    </select>

    <button onclick="registerCourse()">
        Register Now
    </button>

    <p id="result"></p>

    <div class="course-info">
        <strong>Available Courses</strong>
        <br><br>
        ☕ Java Development<br>
        🐍 Python Programming<br>
        🌐 Full Stack Web Development
    </div>

    <div class="footer">
        Balamurugan Course Registration System
    </div>

</div>

<script>

function registerCourse(){

    let data={
        name:document.getElementById("inname").value,
        email:document.getElementById("inemail").value,
        course:document.getElementById("incourse").value
    };

    fetch("http://localhost:8080/user/register",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    })
    .then(response=>response.text())
    .then(data=>{
        document.getElementById("result").innerHTML=
            "✅ " + data;
    })
    .catch(error=>{
        document.getElementById("result").innerHTML=
            "❌ Registration Failed";
        console.error(error);
    });
}

</script>

</body>
</html>
